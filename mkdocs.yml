site_name: 简明Vdbench教程
site_description: A Byte of Vdbench
site_url: https://sine-io.github.io/byte-of-vdbench/
repo_url: https://github.com/sine-io/byte-of-vdbench
repo_name: sine-io/byte-of-vdbench
docs_dir: docs
site_dir: site
exclude_docs: |
  /superpowers/**

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - 说明: zh-cn/README.md
  - 新手村:
      - 介绍: zh-cn/zero/introduction.md
      - 快速开始: zh-cn/zero/quickstart.md
  - 进阶营:
      - 参数文件详解: zh-cn/hero/parameter-file-detail.md
      - 命令行参数详解: zh-cn/hero/execution-parameter-detail.md
      - 实用命令详解: zh-cn/hero/utility-functions-detail.md
      - 其他: zh-cn/hero/others.md
  - 附录: zh-cn/hero/appendix.md
